{% extends "base.html" %}

{% block content %}
<div style="margin-bottom: 2.5rem;">
    <h2 style="font-size: 1.75rem; font-weight: 800; color: var(--text-main); letter-spacing: -0.025em;">Child Courses</h2>
    <p style="color: var(--text-muted); font-size: 0.95rem;">Review the curriculum and track real-time progress for your child's active subjects.</p>
</div>

<div class="grid">
    {% for c in enrollments %}
    <div class="card" style="padding: 0; overflow: hidden; display: flex; flex-direction: column;">
        <img src="{{ c.thumbnail or 'https://images.unsplash.com/photo-1516116216624-53e697fedbea?w=400&h=200&fit=crop' }}" style="width: 100%; height: 160px; object-fit: cover;">
        <div style="padding: 1.5rem; flex: 1; display: flex; flex-direction: column;">
            <span class="badge" style="background: #DBEAFE; color: var(--primary-color); align-self: flex-start; margin-bottom: 0.75rem;">{{ c.category }}</span>
            <h4 style="font-size: 1.15rem; font-weight: 800; margin-bottom: 1rem; color: var(--text-main);">{{ c.title }}</h4>
            
            <div style="margin-top: auto;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                    <span style="font-size: 0.8rem; color: var(--text-muted); font-weight: 600;">Completion Progress</span>
                    <span style="font-size: 0.8rem; font-weight: 800; color: var(--primary-color);">{{ c.progress }}%</span>
                </div>
                <div style="height: 8px; background: #E2E8F0; border-radius: 4px; overflow: hidden;">
                    <div style="width: {{ c.progress }}%; height: 100%; background: var(--primary-color);"></div>
                </div>
            </div>
            
            <div style="margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--border-color);">
                <button class="btn btn-outline" style="width: 100%; border: 1px solid var(--border-color); color: var(--text-main); font-weight: 700; font-size: 0.85rem;">View Detailed Report</button>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
