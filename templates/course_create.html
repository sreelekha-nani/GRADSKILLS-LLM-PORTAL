{% extends "base.html" %}

{% block content %}
<h2 style="margin-bottom: 1.5rem;">Create New Course</h2>

<div class="card" style="max-width: 600px;">
    <form method="POST">
        <div class="form-group">
            <label>Course Title</label>
            <input type="text" name="title" class="form-control" required>
        </div>
        <div class="form-group">
            <label>Category</label>
            <input type="text" name="category" class="form-control" required placeholder="e.g. Programming, Design">
        </div>
        <div class="form-group">
            <label>Price ($)</label>
            <input type="number" step="0.01" name="price" class="form-control" required value="0.00">
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea name="description" class="form-control" rows="5" required></textarea>
        </div>
        <button type="submit" class="btn btn-success">Save Course</button>
    </form>
</div>
{% endblock %}
